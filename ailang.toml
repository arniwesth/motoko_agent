[package]
name = "local/motoko_agent"
version = "0.1.0"
edition = "1"
module_prefix = "src"
ailang = ">=0.16.1"

[dependencies]
"sunholo/logging" = "0.4.0"
# Registry-published versions (ailang-packages 2026-05-08). Local-path overrides
# removed so external clones / Arni's PR review work without needing
# ../ailang-packages alongside the checkout.
"sunholo/motoko_ext_abi" = "2.2.0"
"sunholo/motoko_ext_test_dummy" = "0.2.1"
"sunholo/motoko_ext_omnigraph" = "0.2.2"
"sunholo/motoko_ext_context_mode" = "0.2.1"
"sunholo/motoko_ext_mcp" = "0.2.5"
"sunholo/motoko_ext_exa_search" = "0.2.5"
"sunholo/motoko_ext_ai_compat" = "0.1.0"
"sunholo/motoko_ext_compose" = "0.2.1"
"sunholo/motoko_ext_a2a" = "0.2.1"
"sunholo/motoko_ext_decision_framework" = "0.2.1"
"sunholo/motoko_ext_microrag" = "0.4.1"
"sunholo/motoko_ext_compaction_ai" = "0.2.0"
"sunholo/motoko_ext_ailang_docs" = "0.1.2"

[extensions]
packages      = [
  "sunholo/motoko_ext_test_dummy@0.2.1",
  "sunholo/motoko_ext_omnigraph@0.2.2",
  "sunholo/motoko_ext_context_mode@0.2.1",
  "sunholo/motoko_ext_mcp@0.2.5",
  "sunholo/motoko_ext_exa_search@0.2.5",
  "sunholo/motoko_ext_ailang_docs@0.1.2",
  "sunholo/motoko_ext_compose@0.2.1",
  "sunholo/motoko_ext_a2a@0.2.1",
  "sunholo/motoko_ext_decision_framework@0.2.1",
  "sunholo/motoko_ext_microrag@0.4.1",
  "sunholo/motoko_ext_compaction_ai@0.2.0",
]
config_import   = "src/core/config.RuntimeConfig"
hooks_import    = "src/core/ext/types.ExtensionHooks"
registry_import = "src/core/ext/types.ExtRegistry"
output          = "src/core/ext/registry_generated.ail"

[effects]
max = ["IO", "Env", "AI", "Net", "FS", "Process", "SharedMem", "Clock", "Stream", "SharedIndex", "Rand"]

# OpenRouter provider for streaming (M-AI-PROVIDER-CONFIG, v0.15.0+).
# All "openrouter/<model>" strings the agent accepts route through this block;
# the compat shim in src/core/ai_compat strips the "openrouter/" prefix before
# calling std/ai/streaming.callStream.
#
# Verified working with z-ai/glm-5 (best-performing OS model on the AILANG
# benchmark suite, 85.3% success rate at $0.60/M input · $2.08/M output).
# Other OpenRouter-routed models (anthropic/claude-sonnet-4-5, meta-llama/...)
# work with the same block — OpenRouter dispatches per the model identifier.
[[ai_provider]]
schema_version = 1
name = "motoko-or"
endpoint = "https://openrouter.ai/api/v1/chat/completions"
request_shape = "openai_chat"
response_path = "$.choices[0].message.content"
auth = { type = "bearer", env = "OPENROUTER_API_KEY" }
auth_headers = { HTTP-Referer = "https://github.com/arniwesth/motoko_agent", X-Title = "motoko_agent" }
cost = { input_per_1m_usd = 0.60, output_per_1m_usd = 2.08 }
capabilities = { tool_calling = true, json_mode = true, streaming = true, vision = false, structured_outputs = false }

[ai_provider.streaming]
enabled = true
delta_path = "$.choices[0].delta.content"
reasoning_path = "$.choices[0].delta.reasoning_content"
done_sentinel = "[DONE]"
