services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/motoko_agent:cached
    command: sleep infinity
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      EXA_API_KEY: ${EXA_API_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://clickstack:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_EXPORTER_OTLP_TIMEOUT: ${OTEL_EXPORTER_OTLP_TIMEOUT:-5000}
      OTEL_SERVICE_NAME: motoko-agent
      AILANG_TRACE: standard
      AILANG_TRACE_MAX_SPANS: ${AILANG_TRACE_MAX_SPANS:-100}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  clickstack:
    image: clickhouse/clickstack-all-in-one:2.21.0
    profiles: ["observability"]
    ports:
      - "8081:8080"
      - "18123:8123"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - clickstack-db:/data/db
      - clickstack-ch:/var/lib/clickhouse
      - clickstack-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  clickstack-db:
  clickstack-ch:
  clickstack-logs:
