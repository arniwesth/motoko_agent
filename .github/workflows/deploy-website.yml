name: deploy-website

on:
  push:
    branches:
      - main
      - motoko_website
    paths:
      - 'src/main.cpp'
      - 'web/**'
      - 'Makefile'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Fetch web dependencies
        run: make deps

      - name: Build web artifacts
        run: |
          mkdir -p web/dist
          emcc src/main.cpp \
            ext/imgui/imgui.cpp ext/imgui/imgui_draw.cpp \
            ext/imgui/imgui_tables.cpp ext/imgui/imgui_widgets.cpp \
            -Iext/sokol -Iext/imgui \
            -std=c++17 -O2 \
            -sUSE_WEBGL2=1 -sMIN_WEBGL_VERSION=2 -sMAX_WEBGL_VERSION=2 \
            -sALLOW_MEMORY_GROWTH=1 -sNO_EXIT_RUNTIME=1 \
            --preload-file web/assets@/assets \
            -o web/dist/motoko.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
