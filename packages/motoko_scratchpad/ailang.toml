[package]
name = "sunholo/motoko_ext_scratchpad"
version = "0.1.0"
edition = "1"

[dependencies]
"sunholo/motoko_ext_abi" = "2.2.0"

[effects]
max = ["IO", "Env", "AI", "Net", "FS", "Process", "SharedMem", "Clock", "Stream"]

[exports]
modules = [
  "sunholo/motoko_ext_scratchpad/register",
  "sunholo/motoko_ext_scratchpad/scratchpad",
  "sunholo/motoko_ext_scratchpad/ws_loopback",
  "sunholo/motoko_ext_scratchpad/prompts",
  "sunholo/motoko_ext_scratchpad/types"
]
